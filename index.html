<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Validator & Formatter </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="container">
        <header>
            <div class="logo">
                <h1><i class="fas fa-code"></i> JSON Validator </h1>
                <p>Validate, and format,  your data instantly.</p>
            </div>
            <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon" id="theme-icon"></i>
            </button>
        </header>

        <div class="toolbar">
            <div class="btn-group">
                <label for="file-input" class="action-btn">
                    <i class="fas fa-file-upload"></i> Upload JSON
                </label>
                <input type="file" id="file-input" accept=".json" style="display:none">
                <button id="validate-btn" class="primary-btn">
                    <i class="fas fa-wand-magic-sparkles"></i> Validate & Format
                </button>
            </div>
            <div class="btn-group">
                <button id="copy-btn"><i class="fas fa-copy"></i> Copy</button>
                <button id="download-btn"><i class="fas fa-download"></i> Download</button>
                <button id="clear-btn" class="danger-btn"><i class="fas fa-trash-can"></i> Clear</button>
            </div>
        </div>

        <div class="main-content">
            <div class="pane">
                <div class="pane-label">Raw Input</div>
                <textarea id="json-input" placeholder='Paste your JSON here... ' spellcheck="false"></textarea>
            </div>
            <div class="pane">
                <div class="pane-label">Formatted Output</div>
                <div id="output-container">
                    <pre id="json-output"></pre>
                </div>
            </div>
        </div>

        <div id="status-bar" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
